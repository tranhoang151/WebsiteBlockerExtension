<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Blocker</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 320px;
        padding: 16px;
        background: #fff;
        color: #1a1a1a;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Status text */
      .status-text {
        font-size: 12px;
        font-weight: 500;
      }

      .status-text.enabled {
        color: #4caf50;
      }

      .status-text.disabled {
        color: #f44336;
      }

      .status-text.scheduled-active {
        color: #4caf50;
      }

      .status-text.scheduled-waiting {
        color: #ff9800;
      }

      /* Toggle switch (manual mode) */
      .toggle-label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 13px;
        color: #555;
      }

      .toggle-label input[type="checkbox"] {
        display: none;
      }

      .toggle-track {
        width: 36px;
        height: 20px;
        background: #ccc;
        border-radius: 10px;
        position: relative;
        transition: background 0.2s;
      }

      .toggle-track::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: left 0.2s;
      }

      .toggle-label input:checked + .toggle-track {
        background: #4caf50;
      }

      .toggle-label input:checked + .toggle-track::after {
        left: 18px;
      }

      /* Schedule button */
      #schedule-btn {
        padding: 5px 10px;
        background: #1976d2;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      #schedule-btn:hover {
        background: #1565c0;
      }

      /* Add domain form */
      .add-form {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .add-form input[type="text"] {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
      }

      .add-form input[type="text"]:focus {
        border-color: #4caf50;
      }

      .add-form button {
        padding: 7px 14px;
        background: #4caf50;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .add-form button:hover {
        background: #43a047;
      }

      /* Error message */
      #error-msg {
        font-size: 12px;
        color: #f44336;
        min-height: 16px;
        margin-bottom: 8px;
      }

      /* Domain list */
      #domain-list {
        list-style: none;
        max-height: 180px;
        overflow-y: auto;
      }

      #domain-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 8px;
        border-radius: 6px;
        font-size: 13px;
      }

      #domain-list li:nth-child(odd) {
        background: #f7f7f7;
      }

      #domain-list li button {
        background: none;
        border: none;
        color: #f44336;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 0 4px;
        border-radius: 4px;
        transition: background 0.15s;
      }

      #domain-list li button:hover {
        background: #fdecea;
      }

      .empty-msg {
        font-size: 13px;
        color: #aaa;
        text-align: center;
        padding: 20px 0;
      }

      /* ── Schedule Panel ── */
      #schedule-modal {
        display: none;
        border-top: 1px solid #eee;
        margin-top: 12px;
        padding-top: 12px;
      }

      #schedule-modal.open {
        display: block;
      }

      .modal-box h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      /* Mode toggle row */
      .mode-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 13px;
      }

      .mode-row label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      /* Day selector */
      .day-selector {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .day-btn {
        width: 34px;
        height: 28px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #f5f5f5;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .day-btn.active {
        background: #1976d2;
        color: #fff;
        border-color: #1976d2;
      }

      /* Interval list */
      .section-label {
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-bottom: 6px;
      }

      #interval-list {
        list-style: none;
        margin-bottom: 10px;
      }

      #interval-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 6px;
        border-radius: 5px;
        font-size: 12px;
        background: #f7f7f7;
        margin-bottom: 4px;
      }

      #interval-list li button {
        background: none;
        border: none;
        color: #f44336;
        cursor: pointer;
        font-size: 15px;
        padding: 0 3px;
        border-radius: 3px;
      }

      #interval-list li button:hover {
        background: #fdecea;
      }

      /* Add interval form */
      .interval-form {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      .interval-form input[type="time"] {
        flex: 1;
        min-width: 80px;
        padding: 5px 6px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 12px;
        outline: none;
      }

      .interval-form input[type="time"]:focus {
        border-color: #1976d2;
      }

      .interval-form button {
        padding: 5px 10px;
        background: #4caf50;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 12px;
        cursor: pointer;
      }

      .interval-form button:hover {
        background: #43a047;
      }

      #interval-error {
        font-size: 11px;
        color: #f44336;
        min-height: 14px;
        margin-bottom: 8px;
      }

      #schedule-warning {
        font-size: 11px;
        color: #ff9800;
        min-height: 14px;
        margin-bottom: 8px;
      }

      /* Modal actions */
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
      }

      .modal-actions button {
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        border: none;
      }

      #modal-cancel {
        background: #f5f5f5;
        color: #333;
      }

      #modal-cancel:hover {
        background: #e0e0e0;
      }

      #modal-save {
        background: #1976d2;
        color: #fff;
      }

      #modal-save:hover {
        background: #1565c0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Website Blocker</h1>
      <div class="header-right">
        <span class="status-text" id="status-text">Enabled</span>
        <!-- Manual mode toggle (hidden in schedule mode) -->
        <label class="toggle-label" id="toggle-wrapper" aria-label="Toggle blocking">
          <input type="checkbox" id="toggle-enabled" />
          <span class="toggle-track"></span>
        </label>
        <button id="schedule-btn" type="button" aria-label="Open schedule settings">Schedule</button>
      </div>
    </header>

    <div class="add-form">
      <input
        type="text"
        id="domain-input"
        placeholder="e.g. facebook.com"
        aria-label="Domain to block"
      />
      <button id="add-btn" type="button">Add</button>
    </div>

    <p id="error-msg" role="alert" aria-live="polite"></p>
    <p id="main-schedule-warning" role="status" aria-live="polite" style="font-size:12px;color:#ff9800;min-height:16px;margin-bottom:8px;"></p>

    <ul id="domain-list" aria-label="Blocked domains"></ul>

    <!-- Schedule Panel -->
    <div id="schedule-modal" role="region" aria-label="Schedule settings">
        <h2>Schedule Settings</h2>

        <!-- Schedule on/off toggle -->
        <div class="mode-row">
          <span>Enable Schedule</span>
          <label class="toggle-label" aria-label="Toggle schedule mode">
            <input type="checkbox" id="mode-toggle" />
            <span class="toggle-track"></span>
          </label>
        </div>

        <!-- Day selector -->
        <p class="section-label">Active Days (Click a day to deactivate)</p>
        <div class="day-selector" id="day-selector" aria-label="Select active days">
          <button class="day-btn" data-day="0" type="button">Sun</button>
          <button class="day-btn" data-day="1" type="button">Mon</button>
          <button class="day-btn" data-day="2" type="button">Tue</button>
          <button class="day-btn" data-day="3" type="button">Wed</button>
          <button class="day-btn" data-day="4" type="button">Thu</button>
          <button class="day-btn" data-day="5" type="button">Fri</button>
          <button class="day-btn" data-day="6" type="button">Sat</button>
        </div>

        <!-- Time intervals -->
        <p class="section-label">Time Intervals</p>
        <ul id="interval-list" aria-label="Time intervals"></ul>

        <div class="interval-form">
          <input type="time" id="interval-start" aria-label="Start time" />
          <input type="time" id="interval-end" aria-label="End time" />
          <button id="add-interval-btn" type="button">Add</button>
        </div>

        <p id="interval-error" role="alert" aria-live="polite"></p>
        <p id="schedule-warning" role="status" aria-live="polite"></p>

        <div class="modal-actions">
          <button id="modal-cancel" type="button">Cancel</button>
          <button id="modal-save" type="button">Save</button>
        </div>
    </div>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
