<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Blocked</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        background: #fff;
        border-radius: 12px;
        padding: 48px 40px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 90%;
      }

      .icon {
        font-size: 56px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #f44336;
      }

      .domain {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        background: #f7f7f7;
        border-radius: 6px;
        padding: 8px 16px;
        display: inline-block;
        margin-bottom: 20px;
        word-break: break-all;
      }

      p {
        font-size: 14px;
        color: #666;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      button {
        padding: 10px 28px;
        background: #4caf50;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: #43a047;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🚫</div>
      <h1>Page Blocked</h1>
      <div class="domain" id="blocked-domain"></div>
      <p>This website has been blocked to help you stay focused.</p>
      <button id="go-back-btn" type="button">Go Back</button>
    </div>

    <script type="module" src="blocked.ts"></script>
  </body>
</html>
